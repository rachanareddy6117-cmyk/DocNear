<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — DocNear</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <a href="index.html" class="brand"><span class="dot"></span> DocNear</a>
  <nav></nav>
  <div class="nav-actions" id="navUserSlot"></div>
</div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-panel">
    <div class="panel-head"><h1 id="pageTitle">Reports</h1></div>

    <!-- Patient upload form (shown for patients only) -->
    <div class="card hidden" id="uploadCard">
      <h3>Upload a report</h3>
      <div class="form-msg" id="uploadMsg"></div>
      <form id="uploadForm">
        <div class="field">
          <label>Title</label>
          <input type="text" id="reportTitle" required placeholder="e.g. X-Ray Chest, MRI Scan">
        </div>
        <div class="field">
          <label>Description (optional)</label>
          <textarea id="reportDesc" rows="2" placeholder="Any notes about this report"></textarea>
        </div>
        <div class="field">
          <label>File (PDF, JPG, or PNG)</label>
          <input type="file" id="reportFile" accept=".pdf,.jpg,.jpeg,.png" required>
        </div>
        <button class="btn btn-coral btn-block" type="submit">Upload report</button>
      </form>
    </div>

    <h3 class="mt-24" id="listTitle">My reports</h3>
    <div class="card list-card" id="reportList">
      <div class="empty-state">Loading...</div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/auth-guard.js"></script>
<script>
  const user = requireAuth();
  const isDoctor = user.role === "doctor";

  document.getElementById("sidebar").innerHTML = isDoctor
    ? `<a href="doctor-dashboard.html">🏠 Overview</a><a href="reports.html" class="active">📤 Shared Reports</a>`
    : `<a href="patient-dashboard.html">🏠 Overview</a>
       <a href="find-doctors.html">🔎 Find Doctors</a>
       <a href="appointments.html">📅 Appointments</a>
       <a href="prescriptions.html">📝 Prescriptions</a>
       <a href="medications.html">💊 Order Medicines</a>
       <a href="labtests.html">🩸 Book Blood Test</a>
       <a href="reports.html" class="active">📤 My Reports</a>`;

  if (!isDoctor) {
    document.getElementById("uploadCard").classList.remove("hidden");
  } else {
    document.getElementById("pageTitle").textContent = "Reports shared with me";
    document.getElementById("listTitle").textContent = "Shared by patients";
  }

  document.getElementById("uploadForm")?.addEventListener("submit", async (e) => {
    e.preventDefault();
    const msg = document.getElementById("uploadMsg");
    try {
      const fileInput = document.getElementById("reportFile");
      if (!fileInput.files.length) throw new Error("Please choose a file");

      const formData = new FormData();
      formData.append("title", document.getElementById("reportTitle").value);
      formData.append("description", document.getElementById("reportDesc").value);
      formData.append("file", fileInput.files[0]);

      await Api.uploadReport(formData);
      msg.textContent = "Report uploaded successfully!";
      msg.className = "form-msg success";
      document.getElementById("uploadForm").reset();
      loadReports();
    } catch (err) {
      msg.textContent = err.message;
      msg.className = "form-msg error";
    }
  });

  async function loadReports() {
    const list = document.getElementById("reportList");
    try {
      const reports = isDoctor ? await Api.sharedReports() : await Api.myReports();
      if (!reports.length) {
        list.innerHTML = `<div class="empty-state">No reports ${isDoctor ? "shared with you" : "uploaded"} yet.</div>`;
        return;
      }
      list.innerHTML = reports
        .map(
          (r) => `
        <div class="list-row">
          <div class="who">
            <div class="avatar">📄</div>
            <div>
              <div class="meta-title">${r.title}${isDoctor && r.patient ? " — " + r.patient.name : ""}</div>
              <div class="meta-sub">${formatDate(r.createdAt)}${r.description ? " · " + r.description : ""}</div>
            </div>
          </div>
          <a href="http://localhost:5000${r.fileUrl}" target="_blank" class="btn btn-sm btn-outline">View</a>
        </div>`
        )
        .join("");
    } catch (err) {
      list.innerHTML = `<div class="empty-state">${err.message}</div>`;
    }
  }

  loadReports();
</script>
</body>
</html>
