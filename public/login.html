<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — DocNear</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <a href="index.html" class="brand"><span class="dot"></span> DocNear</a>
  <nav></nav>
  <div class="nav-actions"><a href="register.html" class="btn btn-ghost btn-sm">Sign up</a></div>
</div>

<div class="auth-wrap">
  <div class="auth-card" style="max-width:400px;">
    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to manage appointments, prescriptions, and consult your doctor.</p>

    <div class="form-msg" id="formMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" required placeholder="you@example.com" value="patient@sehatsathi.com">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••" value="password123">
      </div>

      <button type="submit" class="btn btn-primary btn-block mt-8" id="submitBtn">Log in</button>
    </form>

    <p class="text-center text-small mt-16">Don't have an account? <a href="register.html">Sign up</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth-guard.js"></script>
<script>
  // Redirect logged-in users away from login page
  if (currentUser) {
    window.location.href = currentUser.role === "doctor" ? "doctor-dashboard.html" : "patient-dashboard.html";
  }

  const form = document.getElementById("loginForm");
  const msg = document.getElementById("formMsg");
  const btn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.className = "form-msg";
    btn.disabled = true;
    btn.textContent = "Logging in...";

    try {
      const payload = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      };

      const data = await Api.login(payload);
      Api.setSession(data.token, data.user);
      window.location.href = data.user.role === "doctor" ? "doctor-dashboard.html" : "patient-dashboard.html";
    } catch (err) {
      msg.textContent = err.message;
      msg.className = "form-msg error";
      btn.disabled = false;
      btn.textContent = "Log in";
    }
  });
</script>
</body>
</html>
